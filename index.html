<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - Rishitha Reddy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2,#ff6b6b);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    color:white;
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h1{
    font-size:3.5rem;
    margin-bottom:15px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h2{
    font-size:2rem;
    margin-bottom:10px;
}

p{
    font-size:1.2rem;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:white;
    color:#764ba2;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}
</style>

</head>
<body>

<div class="container">
    <h1>✨ Welcome ✨</h1>
    <h2>Rishitha Reddy's Website</h2>
    <p>Dockerized Web Application</p>
    <a href="#" class="btn">Explore Now</a>
</div>

</body>
</html>
